apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: models-pvc
  namespace: moviematch
spec:
  accessModes: [ReadOnlyMany]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: moviematch-ml-cv
  namespace: moviematch
  labels:
    app: moviematch-ml-cv
spec:
  replicas: 2
  selector:
    matchLabels:
      app: moviematch-ml-cv
  template:
    metadata:
      labels:
        app: moviematch-ml-cv
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: cv
          image: ghcr.io/OWNER/moviematch/ml-cv:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: moviematch-config
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: moviematch-ml-cv
  namespace: moviematch
spec:
  selector:
    app: moviematch-ml-cv
  ports:
    - port: 8003
      targetPort: 8003
