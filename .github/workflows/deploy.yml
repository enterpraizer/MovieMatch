name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-staging:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.moviematch.example.com
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
      - name: ArgoCD login
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: argocd login "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
      - name: Update image tags
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          for IMG in backend frontend ml-nlp ml-cv ml-recsys; do
            argocd app set moviematch-staging \
              --helm-set "images.$IMG=ghcr.io/$REPO/$IMG:sha-$SHA"
          done
      - name: Sync and wait
        run: |
          argocd app sync moviematch-staging --prune
          argocd app wait moviematch-staging --health --timeout 600

  e2e-staging:
    needs: deploy-staging
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm playwright install chromium --with-deps
      - name: Run E2E
        env:
          PLAYWRIGHT_BASE_URL: https://staging.moviematch.example.com
        run: pnpm playwright test --project=chromium
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  deploy-production:
    needs: e2e-staging
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://moviematch.example.com
    steps:
      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o /usr/local/bin/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd
      - name: ArgoCD login
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: argocd login "$ARGOCD_SERVER" --auth-token "$ARGOCD_AUTH_TOKEN" --grpc-web
      - name: Update production image tags
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          for IMG in backend frontend ml-nlp ml-cv ml-recsys; do
            argocd app set moviematch-prod \
              --helm-set "images.$IMG=ghcr.io/$REPO/$IMG:sha-$SHA"
          done
      - name: Sync and wait
        run: |
          argocd app sync moviematch-prod --prune
          argocd app wait moviematch-prod --health --timeout 900
      - name: Telegram success notification
        if: success()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=MovieMatch prod deployed: ${SHA:0:7}"
      - name: Telegram failure notification
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -d "chat_id=${TG_CHAT}" \
            -d "text=MovieMatch prod DEPLOY FAILED: ${SHA:0:7}"
